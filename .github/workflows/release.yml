name: Continuous Deployment

on:
  push:
    tags:
      - "v*-*-*"

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate a Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header

  publish-binaries:
    name: Publish Binaries
    needs: changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set the release version
        run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Show Zig version
        run: |
          zig version
          zig env

      - name: Install 7z
        run: sudo apt-get install -y p7zip-full

      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall --release=small

      - name: Prepare release assets
        shell: bash
        run: |
          cp LICENSE README.md CHANGELOG.md zig-out/ 2>/dev/null || true
          find zig-out -name '*shellcode*' -delete

      - name: Create release artifacts
        shell: bash
        run: |
          cd zig-out/
          for dir in */; do
            dir="${dir%/}"
            if [[ "$dir" == *"windows"* ]]; then
              7z a -tzip "../zig-win32-utilities-${{ env.RELEASE_VERSION }}-${dir}.zip" "$dir/"
            else
              tar -czvf "../zig-win32-utilities-${{ env.RELEASE_VERSION }}-${dir}.tar.gz" "$dir/"
              shasum -a 512 "../zig-win32-utilities-${{ env.RELEASE_VERSION }}-${dir}.tar.gz" \
                > "../zig-win32-utilities-${{ env.RELEASE_VERSION }}-${dir}.tar.gz.sha512"
            fi
          done

      - name: Upload the binary releases
        uses: svenstaro/upload-release-action@v2
        with:
          file: zig-win32-utilities-${{ env.RELEASE_VERSION }}-*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}
          release_name: "Release ${{ env.RELEASE_VERSION }}"
          body: ${{ needs.changelog.outputs.release_body }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
